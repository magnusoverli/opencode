---
configuration:
  mcp_enabled:
    name: "Enable MCP Home Assistant Integration"
    description: "Enable the Model Context Protocol (MCP) server that allows OpenCode to query entities and call services directly. When enabled, you can ask OpenCode things like 'turn on the living room lights' or 'what's the temperature in the bedroom?'"
  
  lsp_enabled:
    name: "Enable LSP (Language Server Protocol)"
    description: "Enable Language Server Protocol support for intelligent code assistance. Provides real-time diagnostics, auto-completion, and validation for Home Assistant YAML configuration files."
  
  cpu_mode:
    name: "CPU Mode"
    description: "Controls which OpenCode binary is used. 'auto' detects your CPU capabilities automatically (recommended). 'baseline' forces the baseline binary for older CPUs without AVX2 support. 'regular' forces the standard binary."
  
  terminal_theme:
    name: "Terminal Theme"
    description: "Color scheme for the terminal. Choose a theme that's easy on your eyes."
  
  font_size:
    name: "Font Size"
    description: "Terminal font size in pixels. Larger sizes improve readability, smaller sizes show more content."
  
  cursor_style:
    name: "Cursor Style"
    description: "The appearance of the terminal cursor."
  
  cursor_blink:
    name: "Blinking Cursor"
    description: "Whether the terminal cursor should blink."
  
  screenshot_enabled:
    name: "Enable Screenshot Tool"
    description: "Enable visual verification of dashboards and UI pages. When enabled, the AI can take screenshots of Home Assistant pages using a headless browser to verify the result of dashboard changes. Requires a Long-Lived Access Token (below). Each screenshot takes approximately 5-10 seconds."

  ppq_private_enabled:
    name: "Enable PPQ Private TEE Models (Beta)"
    description: "Start an internal PPQ private-mode encryption proxy and add it as an OpenCode provider. This feature is included in stable releases, but should still be considered beta. The proxy binds only to 127.0.0.1 inside the add-on container and is not exposed on your network. Requires a PPQ API key."

  ppq_api_key:
    name: "PPQ API Key"
    description: "API key for PPQ private-mode models. Stored as a masked add-on option and exported only to the internal PPQ proxy service. Leave empty unless the beta PPQ private mode is enabled."

  addon_access_enabled:
    name: "Enable Add-on Folder Guidance"
    description: "Show guidance for working with Home Assistant add-on folders. Security note: /addons and /addon_configs are mounted into this add-on for development access, and /addon_configs may contain sensitive add-on data. Changing this option requires restarting the add-on to update terminal guidance, but it is not a hard filesystem permission boundary."

  enable_server:
    name: "Enable OpenCode LAN Server"
    description: "Start an OpenCode server on internal port 4096. To access it from another computer, also map 4096/tcp in the Network settings. Only use this on trusted networks and never expose it to the internet."

  access_token:
    name: "Home Assistant Access Token"
    description: "A long-lived access token for direct communication with Home Assistant Core. Required for ESPHome integration and the screenshot tool. Create one in the HA UI under Profile → Long-Lived Access Tokens. Leave empty if you don't use ESPHome or screenshot tools."

  z2m_url:
    name: "Zigbee2MQTT URL"
    description: "Optional URL for Zigbee2MQTT, used by zigporter commands such as list-z2m and network-map. Include http:// or https://, for example http://homeassistant.local:8099. Host/IP-only values are treated as http://."

  z2m_mqtt_topic:
    name: "Zigbee2MQTT MQTT Topic"
    description: "MQTT base topic used by Zigbee2MQTT. The default is zigbee2mqtt."

  env_vars:
    name: "Environment Variables"
    description: "Define custom environment variables that are available to OpenCode and the terminal shell. Useful for provider credentials and configuration that must be set as environment variables (e.g. AZURE_RESOURCE_NAME, OPENAI_API_KEY). Each entry needs a variable name and value. Changes take effect after restarting the add-on."

  serial_devices:
    name: "Serial Devices"
    description: "Optional host UART/serial devices to map into the add-on for direct serial access. Use this for local USB flashing or adapter inspection workflows. Changes take effect after restarting the add-on."

  opencode_config:
    name: "Custom OpenCode Configuration (JSON)"
    description: "Advanced: Paste a JSON object to customize OpenCode's own configuration (providers, keybindings, etc.). This is merged with the add-on's built-in config. Leave empty for defaults. See https://opencode.ai/docs/config for the full schema."
