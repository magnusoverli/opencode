---
# Using Debian Trixie base for latest packages and glibc compatibility
# (opencode-ai ships pre-compiled native binaries that require glibc)
# Includes: S6-Overlay, Bashio, TempIO
build_from:
  aarch64: ghcr.io/home-assistant/base-debian:trixie
  amd64: ghcr.io/home-assistant/base-debian:trixie
args:
  # Pin versions for reproducible builds (use 'latest' for auto-updates)
  OPENCODE_VERSION: "latest"
  PPQ_PROXY_VERSION: "0.1.0"
  TSX_VERSION: "4.20.6"
  TTYD_VERSION: "1.7.7"
  # hab CLI is built from source (main branch) in a multi-stage Docker build
labels:
  org.opencontainers.image.title: "OpenCode"
  org.opencontainers.image.description: "AI coding agent for Home Assistant"
  org.opencontainers.image.source: "https://github.com/Rahulsharma0810/opencode"
  org.opencontainers.image.licenses: "Unlicense"
  org.opencontainers.image.vendor: "Rahul Sharma"
