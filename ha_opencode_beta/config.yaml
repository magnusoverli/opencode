---
name: "OpenCode Beta"
description: "Beta channel for OpenCode - AI coding agent for Home Assistant. May contain experimental features."
version: "2.3.7b0"
slug: "ha_opencode_beta"
image: "ghcr.io/magnusoverli/ha_opencode_beta"
url: "https://github.com/magnusoverli/opencode"
arch:
  - aarch64
  - amd64
startup: application
init: false

# Ingress configuration
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot-outline
panel_title: OpenCode Beta
ports:
  4096/tcp: null
  4097/tcp: null
ports_description:
  4096/tcp: "OpenCode LAN server — only serves traffic when the 'OpenCode LAN server' option is enabled"
  4097/tcp: "OpenChamber LAN web UI (requires interface_mode: openchamber)"

# File access - Home Assistant config directory
map:
  - type: homeassistant_config
    read_only: false
  - type: addons
    read_only: false
  - type: all_addon_configs
    read_only: false
    path: /addon_configs

# API access - needed for logs, addon discovery, and ingress session creation
hassio_api: true
hassio_role: manager
homeassistant_api: true

# Security and hardware access - keep permissions minimal
host_network: false
privileged: []
apparmor: true
# Static Supervisor hardware mappings. Keep default-off; users can opt into
# specific serial devices via the serial_devices option below.
uart: false
udev: false

# User-configurable options.
#
# The Home Assistant Configuration tab renders one flat list of fields in the
# exact key order of the schema block below — it supports no headings, no
# collapsible sections, and no conditional visibility. Order is therefore the
# only grouping mechanism available, so the sequence below is deliberate:
#
#   1. Presentation        — what the user looks at every day
#   2. HA integration      — what OpenCode may do inside Home Assistant
#   3. Access control      — what OpenCode may read
#   4. Runtime             — how OpenCode itself is built and updated
#   5. Network exposure    — what is reachable from outside
#   6. Model providers     — where inference happens
#   7. Optional hardware   — Zigbee2MQTT and serial passthrough
#   8. Advanced escapes    — raw env vars and raw config
#
# Two rules hold throughout: a field that only makes sense when another field
# is on sits directly beneath it, and the riskiest/rarest options sit last.
# Keep the options and schema blocks in the same order.
options:
  # --- 1. Presentation ---------------------------------------------------
  # Interface served through Home Assistant Ingress.
  # terminal is the classic ttyd shell; openchamber is the OpenChamber web UI.
  interface_mode: "terminal"
  # Terminal appearance. No effect when interface_mode is openchamber.
  terminal_theme: "breeze"
  font_size: 14
  cursor_style: "block"
  cursor_blink: false
  # Action-first response formatting for easier scanning and execution.
  focus_mode: false

  # --- 2. Home Assistant integration -------------------------------------
  mcp_enabled: true
  lsp_enabled: true
  # Screenshot tool: visual verification of dashboards and UI changes.
  # Requires the access token below to authenticate with the HA frontend.
  screenshot_enabled: false
  # Long-lived access token for direct HA Core API access.
  # Required for ESPHome ingress and the screenshot tool
  # (create at: Profile → Long-lived access tokens).
  access_token: ""
  # Optional bridge to Home Assistant Core's native /api/mcp/<API ID> endpoint.
  # Requires a Home Assistant version that includes the native MCP keyed endpoint.
  native_ha_mcp_enabled: false
  native_ha_mcp_api_id: "assist"

  # --- 3. Access control -------------------------------------------------
  # Deny OpenCode read access to secret files (secrets.yaml, .storage, .cloud,
  # ssl, *.key, *.pem) so their contents cannot reach the model. Set to false
  # for fully unrestricted file access.
  restrict_sensitive_files: true
  # Add-on development guidance for the mounted /addons and /addon_configs
  # folders. Guidance only — the mounts are static add-on metadata.
  addon_access_enabled: false

  # --- 4. OpenCode runtime -----------------------------------------------
  # Update policy: bundled (use the OpenCode shipped in the add-on image;
  # default, lowest resource use) or latest (keep OpenCode updated to the newest
  # release in the background — the update is skipped automatically on low-memory
  # systems and never blocks start-up)
  opencode_update_policy: "bundled"
  # CPU mode: auto (detect), baseline (for older CPUs), regular (force AVX2)
  cpu_mode: "auto"

  # --- 5. Network exposure -----------------------------------------------
  # Optional LAN server mode for remote OpenCode clients.
  # Warning: If you map 4096/tcp in Network settings, this exposes an OpenCode server on your LAN.
  enable_server: false
  # Browser origin(s) allowed to call the LAN server directly (CORS).
  # Only needed for browser-based clients (e.g. a web/VS Code UI pointed at
  # this server); the OpenCode CLI ('opencode attach') does not need this.
  # Example: http://192.168.1.20:8080
  cors_origins: []

  # --- 6. Model providers ------------------------------------------------
  # PPQ private mode: routes OpenCode through a local encryption proxy for
  # TEE-backed models. Requires a PPQ API key. The proxy binds to 127.0.0.1
  # inside the container only.
  ppq_private_enabled: false
  ppq_api_key: ""

  # --- 7. Optional hardware ----------------------------------------------
  # Zigbee2MQTT (optional — only needed for zigporter Z2M commands, and only
  # when auto-discovery does not find the Zigbee2MQTT add-on).
  # Include http:// or https://. Host/IP-only values are treated as http://.
  z2m_url: ""
  z2m_mqtt_topic: "zigbee2mqtt"
  # Serial devices to map into the container (optional)
  # Add paths such as /dev/ttyUSB0, /dev/ttyACM0, or /dev/serial/by-id/...
  serial_devices: []

  # --- 8. Advanced -------------------------------------------------------
  # Optional LAN access to the OpenChamber web UI (only used when
  # interface_mode is openchamber). Serves OpenChamber at the root path on a
  # mappable network port so reverse proxies / tunnels can point straight at it.
  # Warning: If you map 4097/tcp in Network settings, this exposes the
  # OpenChamber UI on your LAN with no Home Assistant Ingress auth in front.
  enable_openchamber_lan: false
  # Environment variables to inject into the container
  env_vars: []
  # Custom OpenCode configuration (JSON)
  opencode_config: ""

schema:
  # --- 1. Presentation ---------------------------------------------------
  interface_mode: list(terminal|openchamber)
  terminal_theme: list(breeze|catppuccin_mocha|catppuccin_latte|dracula|nord|tokyo_night|one_dark|solarized_dark|solarized_light|gruvbox_dark)
  font_size: int(10,24)
  cursor_style: list(block|underline|bar)
  cursor_blink: bool
  focus_mode: bool

  # --- 2. Home Assistant integration -------------------------------------
  mcp_enabled: bool
  lsp_enabled: bool
  screenshot_enabled: bool
  access_token: password
  native_ha_mcp_enabled: bool
  native_ha_mcp_api_id: str?

  # --- 3. Access control -------------------------------------------------
  restrict_sensitive_files: bool
  addon_access_enabled: bool

  # --- 4. OpenCode runtime -----------------------------------------------
  opencode_update_policy: list(latest|bundled)
  cpu_mode: list(auto|baseline|regular)

  # --- 5. Network exposure -----------------------------------------------
  enable_server: bool
  cors_origins:
    - str

  # --- 6. Model providers ------------------------------------------------
  ppq_private_enabled: bool
  ppq_api_key: password

  # --- 7. Optional hardware ----------------------------------------------
  z2m_url: str?
  z2m_mqtt_topic: str?
  serial_devices:
    - device(subsystem=tty)?

  # --- 8. Advanced -------------------------------------------------------
  enable_openchamber_lan: bool
  env_vars:
    - name: str
      value: str
  opencode_config: str?

# Exclude caches from backups
backup_exclude:
  - ".npm/*"
  - ".npm-global/*"
  - ".cache/*"
  - ".local/share/opencode/cache/*"
  - ".env_vars"
  - ".env_vars_discovered"
