---
name: "OpenCode Beta"
description: "Beta channel for OpenCode - AI coding agent for Home Assistant. May contain experimental features."
version: "1.6.1b13"
slug: "ha_opencode_beta"
image: "ghcr.io/magnusoverli/ha_opencode_beta/{arch}"
url: "https://github.com/magnusoverli/opencode"
arch:
  - aarch64
  - amd64
startup: application
init: false

# Ingress configuration
ingress: true
ingress_port: 8099
ingress_stream: true
panel_icon: mdi:robot-outline
panel_title: OpenCode Beta

# File access - Home Assistant config directory
map:
  - type: homeassistant_config
    read_only: false

# API access - needed for logs, addon discovery, and ingress session creation
hassio_api: true
hassio_role: manager
homeassistant_api: true

# Security - keep permissions minimal
host_network: false
privileged: []
apparmor: true

# User-configurable options
options:
  # Feature toggles
  mcp_enabled: true
  lsp_enabled: true

  # CPU mode: auto (detect), baseline (for older CPUs), regular (force AVX2)
  cpu_mode: "auto"

  # Terminal appearance
  terminal_theme: "breeze"
  font_size: 14
  cursor_style: "block"
  cursor_blink: false

  # Long-lived access token for direct HA Core API access.
  # Required for ESPHome ingress (create at: Profile → Long-Lived Access Tokens).
  # Leave empty if you don't use ESPHome tools.
  access_token: ""

  # Environment variables to inject into the container
  env_vars: []

  # Advanced: custom OpenCode configuration (JSON)
  opencode_config: ""

schema:
  # Feature toggles
  mcp_enabled: bool
  lsp_enabled: bool

  # CPU mode
  cpu_mode: list(auto|baseline|regular)

  # Terminal appearance
  terminal_theme: list(breeze|catppuccin_mocha|catppuccin_latte|dracula|nord|tokyo_night|one_dark|solarized_dark|solarized_light|gruvbox_dark)
  font_size: int(10,24)
  cursor_style: list(block|underline|bar)
  cursor_blink: bool

  # HA Core access token
  access_token: str?

  # Environment variables
  env_vars:
    - name: str
      value: str

  # Advanced
  opencode_config: str?

# Exclude caches from backups
backup_exclude:
  - ".npm/*"
  - ".cache/*"
  - ".local/share/opencode/cache/*"
  - ".env_vars"
