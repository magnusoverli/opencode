---
configuration:
  interface_mode:
    name: "Interface mode"
    description: "Choose the browser interface shown in the Home Assistant sidebar. 'terminal' is the classic ttyd terminal. 'openchamber' serves the OpenChamber web UI through Home Assistant Ingress. If OpenChamber misbehaves, switch back to 'terminal' and restart the add-on."

  terminal_theme:
    name: "Terminal theme"
    description: "Color scheme for the terminal. Choose a theme that's easy on your eyes."

  font_size:
    name: "Font size"
    description: "Terminal font size in pixels. Larger sizes improve readability, smaller sizes show more content."

  cursor_style:
    name: "Cursor style"
    description: "The appearance of the terminal cursor."

  cursor_blink:
    name: "Cursor blinking"
    description: "Whether the terminal cursor should blink."

  mcp_enabled:
    name: "Enable MCP integration"
    description: "Enable the Model Context Protocol (MCP) server that lets OpenCode query entities and call services directly, so you can ask for things like turning on the living room lights or checking the bedroom temperature."

  native_ha_mcp_enabled:
    name: "Enable native Home Assistant MCP bridge"
    description: "Add an optional second MCP server in OpenCode that proxies to Home Assistant Core's native LLM MCP endpoint (/api/mcp/<API ID>) when your Home Assistant version supports it. Leave disabled unless you are testing the new Home Assistant native LLM/MCP platform. This complements, but does not replace, OpenCode's built-in MCP tools."

  native_ha_mcp_api_id:
    name: "Native Home Assistant MCP API ID"
    description: "Home Assistant native LLM API ID to consume through the beta bridge. The default 'assist' targets /api/mcp/assist. Use a custom API ID to target /api/mcp/<API ID>, or leave empty to target Home Assistant's configured /api/mcp endpoint. Custom keyed API endpoints require admin access in Home Assistant except for Assist."

  lsp_enabled:
    name: "Enable LSP integration"
    description: "Enable Language Server Protocol (LSP) support for intelligent code assistance. Provides real-time diagnostics, auto-completion, and validation for Home Assistant YAML configuration files."

  screenshot_enabled:
    name: "Enable screenshot tool"
    description: "Enable visual verification of dashboards and UI pages. When enabled, the AI can take screenshots of Home Assistant pages using a headless browser to verify the result of dashboard changes. Requires a Home Assistant access token (below). Each screenshot takes approximately 5-10 seconds."

  access_token:
    name: "Home Assistant access token"
    description: "A long-lived access token for direct communication with Home Assistant Core. Required for ESPHome integration and the screenshot tool. Create one in the Home Assistant UI under Profile → Long-lived access tokens. Leave empty if you don't use ESPHome or screenshot tools."

  opencode_update_policy:
    name: "OpenCode update policy"
    description: "Controls how OpenCode itself is updated. 'latest' installs and updates OpenCode in persistent add-on data so it can follow upstream releases independently of add-on releases. 'bundled' uses only the OpenCode version included in the add-on image and disables OpenCode self-update."

  cpu_mode:
    name: "CPU mode"
    description: "Controls which OpenCode binary is used. 'auto' detects your CPU capabilities automatically (recommended). 'baseline' forces the baseline binary for older CPUs without AVX2 support. 'regular' forces the standard binary."

  z2m_url:
    name: "Zigbee2MQTT URL"
    description: "Optional URL for Zigbee2MQTT, used by zigporter commands such as 'list-z2m' and 'network-map'. Include http:// or https://, for example 'http://homeassistant.local:8099'. Host/IP-only values are treated as http://."

  z2m_mqtt_topic:
    name: "Zigbee2MQTT base topic"
    description: "MQTT base topic used by Zigbee2MQTT. The default is 'zigbee2mqtt'."

  serial_devices:
    name: "Serial devices"
    description: "Optional host UART/serial devices to map into the add-on for direct serial access. Use this for local USB flashing or adapter inspection workflows."

  ppq_private_enabled:
    name: "Enable PPQ private TEE models (beta)"
    description: "Start an internal PPQ private-mode encryption proxy and add it as an OpenCode provider. The proxy binds only to 127.0.0.1 inside the add-on container and is not exposed on your network. Requires a PPQ API key. This feature should still be considered beta."

  ppq_api_key:
    name: "PPQ API key"
    description: "API key for PPQ private-mode models. Stored as a masked add-on option and exported only to the internal PPQ proxy service. Leave empty unless PPQ private mode is enabled."

  enable_server:
    name: "Enable OpenCode LAN server"
    description: "Start an OpenCode server on internal port 4096. To access it from another computer, also map 4096/tcp in the Network settings. Only use this on trusted networks and never expose it to the internet."

  cors_origins:
    name: "LAN server CORS origins (beta)"
    description: "Browser origin(s) allowed to call the OpenCode LAN server directly, for example a web or VS Code UI (such as the OpenChamber extension) pointed at this add-on instead of using the OpenCode CLI. Each entry must be an exact origin (scheme + host + port, no path), for example 'http://192.168.1.20:8080'. Leave empty if you only use 'opencode attach' or other non-browser clients — without a matching entry here, browser-based clients may be able to list providers/models but never receive chat responses."

  addon_access_enabled:
    name: "Enable add-on folder guidance"
    description: "Show guidance for working with Home Assistant add-on folders. Security note: /addons and /addon_configs are mounted into this add-on for development access, and /addon_configs may contain sensitive add-on data. This is guidance only, not a hard filesystem permission boundary."

  env_vars:
    name: "Environment variables"
    description: "Define custom environment variables that are available to OpenCode and the terminal shell. Useful for provider credentials and configuration that must be set as environment variables, for example 'AZURE_RESOURCE_NAME' or 'OPENAI_API_KEY'. Each entry needs a variable name and value."

  opencode_config:
    name: "Custom OpenCode configuration"
    description: "Paste a JSON object to customize OpenCode's own configuration (providers, keybindings, etc.). This is merged with the add-on's built-in config. Leave empty for defaults. See https://opencode.ai/docs/config for the full schema."
