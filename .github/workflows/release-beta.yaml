---
name: Create Beta Release

on:
  push:
    tags:
      - 'beta-v*'

jobs:
  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#beta-v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Update version in beta config.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version: .*/version: \"${VERSION}\"/" ha_opencode_beta/config.yaml

          # Verify
          grep "version:" ha_opencode_beta/config.yaml

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha_opencode_beta/config.yaml
          git commit -m "chore: bump beta version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin main

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Read changelog from the tagged commit (on dev branch)
          # using git show so we don't need to checkout dev
          CHANGELOG=$(git show ${{ github.ref_name }}:ha_opencode_beta/CHANGELOG.md | awk "
            /^## ${VERSION}$/ { found=1; next }
            found && /^## / { exit }
            found { print }
          ")

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} (Beta)"
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: true
