---
name: Create Beta Release

on:
  push:
    tags:
      - 'beta-v*'

jobs:
  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#beta-v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Sync beta metadata from dev to main
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Update version in beta config.yaml
          sed -i "s/^version: .*/version: \"${VERSION}\"/" ha_opencode_beta/config.yaml
          grep "version:" ha_opencode_beta/config.yaml

          # Copy changelog and docs from the tagged commit (on dev) to main
          # so HA Supervisor can display them in the update UI
          git show ${{ github.ref_name }}:ha_opencode_beta/CHANGELOG.md > ha_opencode_beta/CHANGELOG.md
          git show ${{ github.ref_name }}:ha_opencode_beta/DOCS.md > ha_opencode_beta/DOCS.md

      - name: Commit metadata update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ha_opencode_beta/config.yaml ha_opencode_beta/CHANGELOG.md ha_opencode_beta/DOCS.md
          git commit -m "chore: bump beta to ${{ steps.version.outputs.version }} — sync metadata from dev" || echo "No changes to commit"
          git push origin main

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Changelog is now on main (synced above), read it directly
          CHANGELOG=$(awk "
            /^## ${VERSION}$/ { found=1; next }
            found && /^## / { exit }
            found { print }
          " ha_opencode_beta/CHANGELOG.md)

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} (Beta)"
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: true
