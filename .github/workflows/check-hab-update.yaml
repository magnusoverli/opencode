---
name: Check hab CLI Update

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  check-hab-update:
    name: Check for hab CLI releases
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Get latest hab CLI release
        id: latest
        run: |
          RELEASE=$(curl -fsSL "https://api.github.com/repos/balloob/home-assistant-build-cli/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")
          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          DATE=$(echo "$RELEASE" | jq -r '.published_at')
          URL=$(echo "$RELEASE" | jq -r '.html_url')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Latest hab CLI release: ${TAG} (${DATE})"

      - name: Get pinned hab CLI version
        id: pinned
        run: |
          PINNED=$(grep -oP '^ARG HAB_VERSION=\K\S+' ha_opencode/Dockerfile)
          echo "version=${PINNED}" >> $GITHUB_OUTPUT
          echo "Pinned hab CLI version: ${PINNED}"

      - name: Summary
        run: |
          echo "## hab CLI release status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Pinned version | \`${{ steps.pinned.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest release | [\`${{ steps.latest.outputs.tag }}\`](${{ steps.latest.outputs.url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Released | ${{ steps.latest.outputs.date }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.pinned.outputs.version }}" != "${{ steps.latest.outputs.tag }}" ]; then
            echo "⚠️ A newer release is available. Bump \`HAB_VERSION\` in \`ha_opencode/Dockerfile\`." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Pinned version matches the latest release." >> $GITHUB_STEP_SUMMARY
          fi
